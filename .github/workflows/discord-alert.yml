name: Alertas Discord

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  alerta:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar alerta para Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\":\"🚀 GitHub Actions executado no repositório ${{ github.repository }}. Evento: ${{ github.event_name }}. Branch: ${{ github.ref_name }}. Status: sucesso.\"}" \
          "$DISCORD_WEBHOOK"
